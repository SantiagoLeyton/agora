<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Live2D test — Haru</title>
    <style>
      html, body { margin: 0; height: 100%; background: #1a1a2e; }
      #app { width: 100%; height: 100%; }
      #log { position: fixed; left: 8px; bottom: 8px; color: #9f9; font: 12px monospace; }
    </style>
    <script src="/live2d/core/live2dcubismcore.min.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <pre id="log">loading…</pre>
    <script type="module">
      const log = (m) => {
        document.getElementById("log").textContent = m;
        console.log(m);
      };
      try {
        if (!window.Live2DCubismCore) throw new Error("no Live2DCubismCore");
        const PIXI = await import("https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.mjs");
        window.PIXI = PIXI;
        const { Live2DModel } = await import(
          "https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"
        );
        Live2DModel.registerTicker(PIXI.Ticker);
        const host = document.getElementById("app");
        const app = new PIXI.Application({ resizeTo: host, backgroundAlpha: 0 });
        host.appendChild(app.view);
        const model = await Live2DModel.from("/live2d/haru/Haru.model3.json");
        const size = model.internalModel?.getSize?.();
        log("OK size=" + JSON.stringify(size));
        model.anchor.set(0.5, 0.34);
        model.scale.set(0.35);
        model.position.set(app.screen.width / 2, app.screen.height * 0.5);
        app.stage.addChild(model);
        model.motion("Idle");
        model.expression("F01");
      } catch (e) {
        log("ERROR: " + (e?.message || e));
        console.error(e);
      }
    </script>
  </body>
</html>
